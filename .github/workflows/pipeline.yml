name: DevSecOps Pipeline - service-user

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  security-and-build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret detection (GitLeaks)
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
          ./gitleaks detect --source . --verbose --no-git
        continue-on-error: true

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Snyk CLI
        run: |
          npm install -g snyk
          snyk --version

      - name: Authenticate Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk whoami

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Dependency scan (Snyk)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          ./mvnw dependency:tree
          snyk test \
            --file=pom.xml \
            --package-manager=maven \
            --severity-threshold=high \
            --print-deps \
            --debug
        continue-on-error: true

      - name: Build and analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn clean package -DskipTests sonar:sonar
          -Dsonar.projectKey=DevSecOps-Microservices_service-user
          -Dsonar.organization=devsecops-microservices
          -Dsonar.host.url=https://sonarcloud.io

      - name: Run unit tests
        run: mvn test -Dtest="!ServiceUserApplicationTests"
        continue-on-error: true

      - name: Build Docker image
        run: docker build -t service-user:latest .

      - name: Scan Docker image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: service-user:latest
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

      - name: Trivy SARIF report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: service-user:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker tag service-user:latest ghcr.io/devsecops-microservices/service-user:latest
          docker push ghcr.io/devsecops-microservices/service-user:latest